<p id="contactSub"></p>
<div class="contact-details" id="contactDetails"></div>
</div>
<div class="contact-form-wrap">
<form class="contact-form" id="contactForm">
<div class="form-row">
<div class="form-group">
<label for="fname">Your Name</label>
<input id="fname" name="name" placeholder="John Smith" required="" type="text"/>
</div>
<div class="form-group">
<label for="femail">Your Email</label>
<input id="femail" name="email" placeholder="john@company.com" required="" type="email"/>
</div>
</div>
<div class="form-group">
<label for="fbusiness">Your Business</label>
<input id="fbusiness" name="business" placeholder="Company name or website" type="text"/>
</div>
<div class="form-group">
<label for="fservice">Service You're Interested In</label>
<select id="fservice" name="service">
<option value="">Select a service...</option>
<option>GoHighLevel Setup</option>
<option>Funnel Build</option>
<option>Website Development</option>
<option>Automation System</option>
<option>AI Agent Workflow</option>
<option>Full System Build</option>
</select>
</div>
<div class="form-group">
<label for="fmessage">Tell me about your project</label>
<textarea id="fmessage" name="message" placeholder="What are you trying to achieve? What's not working right now?" rows="4"></textarea>
</div>
<button class="btn btn-primary btn-full" type="submit">
                            Send Message →
                        </button>
<p class="form-note">
                            I respond to serious inquiries within 24 hours.
                        </p>
</form>
<div class="form-success" id="formSuccess" style="display: none">
<div class="success-icon">✓</div>
<h3>Message Received</h3>
<p>I'll be in touch within 24 hours. Talk soon.</p>
</div>
</div>
</div>
