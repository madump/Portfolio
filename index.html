<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            Reyper John Florida — GoHighLevel Expert & Digital Systems Architect
        </title>
        <meta
            name="description"
            content="I build client acquisition systems — websites, funnels, automation, and AI workflows — that turn traffic into revenue."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- NAV -->
        <nav id="navbar">
            <div class="nav-inner">
                <a href="#hero" class="nav-logo"
                    >RJF<span class="logo-dot">.</span></a
                >
                <button
                    class="nav-toggle"
                    id="navToggle"
                    aria-label="Toggle menu"
                >
                    <span></span><span></span><span></span>
                </button>
                <ul class="nav-links" id="navLinks">
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#work">Work</a></li>
                    <li><a href="#process">Process</a></li>
                    <li><a href="#testimonials">Testimonials</a></li>
                    <li><a href="#contact" class="nav-cta">Book a Call</a></li>
                </ul>
            </div>
        </nav>

        <!-- HERO -->
        <section id="hero">
            <div class="hero-bg-grid"></div>
            <div class="hero-glow"></div>
            <div class="container hero-content">
                <div class="hero-eyebrow" id="heroEyebrow"></div>
                <h1 class="hero-headline" id="heroHeadline"></h1>
                <p class="hero-sub" id="heroSub"></p>
                <div class="hero-actions">
                    <a
                        href="#contact"
                        class="btn btn-primary"
                        id="heroCta1"
                    ></a>
                    <a href="#work" class="btn btn-ghost" id="heroCta2"></a>
                </div>
                <div class="hero-badge" id="heroBadge"></div>
            </div>
            <div class="hero-scroll-hint">
                <span>Scroll</span>
                <div class="scroll-line"></div>
            </div>
        </section>

        <!-- TRUST STRIP -->
        <section id="trust">
            <div class="trust-inner">
                <div class="trust-track" id="trustTrack"></div>
            </div>
        </section>

        <!-- ABOUT -->
        <section id="about">
            <div class="container about-grid">
                <div class="about-visual">
                    <div class="about-card">
                        <div class="about-card-inner">
                            <div class="about-stats" id="aboutStats"></div>
                        </div>
                        <div class="about-card-tag">
                            Computer Science Background
                        </div>
                        <div class="about-card-tag tag-2">
                            GoHighLevel Certified Expert
                        </div>
                    </div>
                    <div class="about-deco-line"></div>
                </div>
                <div class="about-copy">
                    <div class="eyebrow" id="aboutEyebrow"></div>
                    <h2 id="aboutHeadline"></h2>
                    <div class="about-body" id="aboutBody"></div>
                </div>
            </div>
        </section>

        <!-- SERVICES -->
        <section id="services">
            <div class="container">
                <div class="section-header">
                    <div class="eyebrow" id="servicesEyebrow"></div>
                    <h2 id="servicesHeadline"></h2>
                    <p class="section-sub" id="servicesSub"></p>
                </div>
                <div class="services-grid" id="servicesGrid"></div>
            </div>
        </section>

        <!-- CASE STUDIES -->
        <section id="work">
            <div class="container">
                <div class="section-header">
                    <div class="eyebrow" id="caseEyebrow"></div>
                    <h2 id="caseHeadline"></h2>
                    <p class="section-sub" id="caseSub"></p>
                </div>
                <div class="cases-grid" id="casesGrid"></div>
            </div>
        </section>

        <!-- PROCESS -->
        <section id="process">
            <div class="process-bg"></div>
            <div class="container">
                <div class="section-header">
                    <div class="eyebrow" id="processEyebrow"></div>
                    <h2 id="processHeadline"></h2>
                    <p class="section-sub" id="processSub"></p>
                </div>
                <div class="process-steps" id="processSteps"></div>
            </div>
        </section>

        <!-- DIFFERENTIATORS -->
        <section id="differentiators">
            <div class="container">
                <div class="section-header">
                    <div class="eyebrow" id="diffEyebrow"></div>
                    <h2 id="diffHeadline"></h2>
                </div>
                <div class="diff-grid" id="diffGrid"></div>
            </div>
        </section>

        <!-- TESTIMONIALS -->
        <section id="testimonials">
            <div class="container">
                <div class="section-header">
                    <div class="eyebrow" id="testEyebrow"></div>
                    <h2 id="testHeadline"></h2>
                </div>
                <div class="testimonials-grid" id="testimonialsGrid"></div>
            </div>
        </section>

        <!-- CTA -->
        <section id="cta-section">
            <div class="cta-glow"></div>
            <div class="container cta-content">
                <div class="eyebrow" id="ctaEyebrow"></div>
                <h2 id="ctaHeadline"></h2>
                <p id="ctaSub"></p>
                <a
                    href="#contact"
                    class="btn btn-primary btn-large"
                    id="ctaBtn"
                ></a>
                <p class="cta-note" id="ctaNote"></p>
            </div>
        </section>

        <!-- CONTACT -->
        <section id="contact">
            <div class="container contact-grid">
                <div class="contact-info">
                    <div class="eyebrow" id="contactEyebrow"></div>
                    <h2 id="contactHeadline"></h2>
                    <p id="contactSub"></p>
                    <div class="contact-details" id="contactDetails"></div>
                </div>
                <div class="contact-form-wrap">
                    <form class="contact-form" id="contactForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="fname">Your Name</label>
                                <input
                                    type="text"
                                    id="fname"
                                    name="name"
                                    placeholder="John Smith"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label for="femail">Your Email</label>
                                <input
                                    type="email"
                                    id="femail"
                                    name="email"
                                    placeholder="john@company.com"
                                    required
                                />
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="fbusiness">Your Business</label>
                            <input
                                type="text"
                                id="fbusiness"
                                name="business"
                                placeholder="Company name or website"
                            />
                        </div>
                        <div class="form-group">
                            <label for="fservice"
                                >Service You're Interested In</label
                            >
                            <select id="fservice" name="service">
                                <option value="">Select a service...</option>
                                <option>GoHighLevel Setup</option>
                                <option>Funnel Build</option>
                                <option>Website Development</option>
                                <option>Automation System</option>
                                <option>AI Agent Workflow</option>
                                <option>Full System Build</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="fmessage"
                                >Tell me about your project</label
                            >
                            <textarea
                                id="fmessage"
                                name="message"
                                rows="4"
                                placeholder="What are you trying to achieve? What's not working right now?"
                            ></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">
                            Send Message →
                        </button>
                        <p class="form-note">
                            I respond to serious inquiries within 24 hours.
                        </p>
                    </form>
                    <div
                        class="form-success"
                        id="formSuccess"
                        style="display: none"
                    >
                        <div class="success-icon">✓</div>
                        <h3>Message Received</h3>
                        <p>I'll be in touch within 24 hours. Talk soon.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- FOOTER -->
        <footer id="footer">
            <div class="container footer-inner">
                <div class="footer-brand">
                    <a href="#hero" class="nav-logo"
                        >RJF<span class="logo-dot">.</span></a
                    >
                    <p id="footerTagline"></p>
                </div>
                <div class="footer-links" id="footerLinks"></div>
                <p class="footer-copy" id="footerCopy"></p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
